<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合命理测算系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #e94560, #ff8c00, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #aaa;
            font-size: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            color: #ccc;
            font-size: 0.9rem;
        }

        input, select {
            padding: 12px 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #e94560;
            background: rgba(0, 0, 0, 0.3);
        }

        .hint {
            color: #888;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e94560, #ff6b81);
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            display: none;
        }

        .result-section.show {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bazi-main {
            text-align: center;
            padding: 25px;
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .bazi-title {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .bazi-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 8px;
        }

        .wuxing-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .wuxing-item {
            text-align: center;
            padding: 18px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
        }

        .wuxing-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .wuxing-value {
            font-size: 1rem;
            color: #ccc;
        }

        .wuge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .wuge-item {
            text-align: center;
            padding: 18px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .wuge-name {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .wuge-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }

        .wuge-fate {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .fate-good {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }

        .fate-bad {
            background: rgba(244, 67, 54, 0.2);
            color: #e57373;
        }

        .fate-normal {
            background: rgba(255, 193, 7, 0.2);
            color: #ffd54f;
        }

        .hexagram-box {
            text-align: center;
            padding: 25px;
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
        }

        .hexagram-symbol {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .hexagram-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .hexagram-text {
            color: #aaa;
            font-style: italic;
            margin-bottom: 15px;
        }

        .life-prediction {
            line-height: 1.8;
            color: #ddd;
            white-space: pre-wrap;
        }

        .disclaimer {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 10px;
            color: #ffd54f;
            font-size: 0.85rem;
            text-align: center;
        }

        .error {
            padding: 15px;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: 10px;
            color: #ff5252;
            display: none;
            margin-bottom: 20px;
        }

        .error.show {
            display: block;
        }

        .nav {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav a {
            color: #e94560;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
        }

        .nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">🏠 俄罗斯方块</a>
            <a href="/i-ching/index.html">🔮 易经占卜</a>
            <a href="/bazi/index.html">🧧 八字分析</a>
        </div>

        <div class="header">
            <h1>🔮 综合命理测算系统</h1>
            <p>融合生辰八字、姓名五格、易经卦象，推演人生轨迹</p>
        </div>

        <div class="card">
            <h2>📝 输入信息</h2>
            <form id="fortune-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="surname">姓氏</label>
                        <input type="text" id="surname" name="surname" placeholder="如：李" maxlength="2" required>
                    </div>
                    <div class="input-group">
                        <label for="givenName">名字</label>
                        <input type="text" id="givenName" name="givenName" placeholder="如：明" maxlength="2" required>
                    </div>
                    <div class="input-group">
                        <label for="year">出生年份</label>
                        <input type="number" id="year" name="year" min="1900" max="2100" value="1990" required>
                    </div>
                    <div class="input-group">
                        <label for="month">出生月份</label>
                        <input type="number" id="month" name="month" min="1" max="12" value="5" required>
                    </div>
                    <div class="input-group">
                        <label for="day">出生日期</label>
                        <input type="number" id="day" name="day" min="1" max="31" value="15" required>
                    </div>
                    <div class="input-group">
                        <label for="hour">出生时辰（0-23）</label>
                        <input type="number" id="hour" name="hour" min="0" max="23" value="12" required>
                        <span class="hint">例如：中午12点填 12</span>
                    </div>
                </div>

                <button type="submit" class="btn">
                    <span class="loading" id="loading"></span>
                    开始综合测算
                </button>
            </form>

            <div class="error" id="error"></div>
        </div>

        <div class="result-section" id="result-section">
            <!-- 八字 -->
            <div class="card">
                <h2>🧧 生辰八字</h2>
                <div class="bazi-main">
                    <div class="bazi-title">四柱八字</div>
                    <div class="bazi-value" id="bazi-value">-</div>
                </div>
                <div class="bazi-title" style="text-align: center;">五行分布 · 主属性：<span id="dominant-wuxing" style="color: #ffd700;">-</span></div>
                <div class="wuxing-grid">
                    <div class="wuxing-item">
                        <div class="wuxing-name" style="color: #4CAF50;">木</div>
                        <div class="wuxing-value" id="wuxing-mu">-</div>
                    </div>
                    <div class="wuxing-item">
                        <div class="wuxing-name" style="color: #F44336;">火</div>
                        <div class="wuxing-value" id="wuxing-huo">-</div>
                    </div>
                    <div class="wuxing-item">
                        <div class="wuxing-name" style="color: #FF9800;">土</div>
                        <div class="wuxing-value" id="wuxing-tu">-</div>
                    </div>
                    <div class="wuxing-item">
                        <div class="wuxing-name" style="color: #FFD700;">金</div>
                        <div class="wuxing-value" id="wuxing-jin">-</div>
                    </div>
                    <div class="wuxing-item">
                        <div class="wuxing-name" style="color: #2196F3;">水</div>
                        <div class="wuxing-value" id="wuxing-shui">-</div>
                    </div>
                </div>
            </div>

            <!-- 五格 -->
            <div class="card">
                <h2>📊 姓名五格</h2>
                <div class="wuge-grid">
                    <div class="wuge-item">
                        <div class="wuge-name">天格</div>
                        <div class="wuge-value" id="tiange-value">-</div>
                        <div class="wuge-fate" id="tiange-fate">-</div>
                    </div>
                    <div class="wuge-item">
                        <div class="wuge-name">人格</div>
                        <div class="wuge-value" id="renge-value">-</div>
                        <div class="wuge-fate" id="renge-fate">-</div>
                    </div>
                    <div class="wuge-item">
                        <div class="wuge-name">地格</div>
                        <div class="wuge-value" id="dige-value">-</div>
                        <div class="wuge-fate" id="dige-fate">-</div>
                    </div>
                    <div class="wuge-item">
                        <div class="wuge-name">外格</div>
                        <div class="wuge-value" id="waige-value">-</div>
                        <div class="wuge-fate" id="waige-fate">-</div>
                    </div>
                    <div class="wuge-item">
                        <div class="wuge-name">总格</div>
                        <div class="wuge-value" id="zongge-value">-</div>
                        <div class="wuge-fate" id="zongge-fate">-</div>
                    </div>
                </div>
            </div>

            <!-- 易经卦象 -->
            <div class="card">
                <h2>☯ 易经卦象</h2>
                <div class="hexagram-box">
                    <div class="hexagram-symbol" id="hexagram-symbol">-</div>
                    <div class="hexagram-name" id="hexagram-name">-</div>
                    <div class="hexagram-text" id="hexagram-text">-</div>
                    <p id="hexagram-fate" style="color: #ddd; line-height: 1.6;">-</p>
                </div>
            </div>

            <!-- 人生推断 -->
            <div class="card">
                <h2>🌟 综合人生推断</h2>
                <div class="life-prediction" id="life-prediction">-</div>
            </div>

            <div class="disclaimer">
                ⚠️ 本系统结果仅供娱乐参考，融合传统文化中的八字、五格、易经等元素，不代表科学预测。人生由自己掌握，请理性看待。
            </div>
        </div>
    </div>

    <script>
        function getFateClass(fate) {
            if (fate.includes('大吉') || fate.includes('吉')) {
                return 'fate-good';
            } else if (fate.includes('凶')) {
                return 'fate-bad';
            } else {
                return 'fate-normal';
            }
        }

        document.getElementById('fortune-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const surname = document.getElementById('surname').value.trim();
            const givenName = document.getElementById('givenName').value.trim();
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const day = document.getElementById('day').value;
            const hour = document.getElementById('hour').value;

            if (!surname || !givenName) {
                showError('请输入姓氏和名字');
                return;
            }

            const resultSection = document.getElementById('result-section');
            const errorDiv = document.getElementById('error');
            const loading = document.getElementById('loading');
            const btn = document.querySelector('.btn');

            resultSection.classList.remove('show');
            errorDiv.classList.remove('show');
            loading.style.display = 'inline-block';
            btn.disabled = true;

            try {
                const response = await fetch('/api/fortune', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: surname + givenName,
                        surname: surname,
                        givenName: givenName,
                        year: parseInt(year),
                        month: parseInt(month),
                        day: parseInt(day),
                        hour: parseInt(hour)
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || '服务器响应错误：' + response.status);
                }

                const data = await response.json();

                // 八字
                document.getElementById('bazi-value').textContent = data.bazi.shenchenbazi;
                document.getElementById('dominant-wuxing').textContent = data.bazi.dominant;
                document.getElementById('wuxing-mu').textContent = data.bazi.wuxing_percent['木'] + '%';
                document.getElementById('wuxing-huo').textContent = data.bazi.wuxing_percent['火'] + '%';
                document.getElementById('wuxing-tu').textContent = data.bazi.wuxing_percent['土'] + '%';
                document.getElementById('wuxing-jin').textContent = data.bazi.wuxing_percent['金'] + '%';
                document.getElementById('wuxing-shui').textContent = data.bazi.wuxing_percent['水'] + '%';

                // 五格
                const wugeFields = ['tiange', 'renge', 'dige', 'waige', 'zongge'];
                wugeFields.forEach(field => {
                    document.getElementById(field + '-value').textContent = data.wuge[field].value;
                    const fateEl = document.getElementById(field + '-fate');
                    const fate = data.wuge[field].fate[0];
                    fateEl.textContent = fate;
                    fateEl.className = 'wuge-fate ' + getFateClass(fate);
                });

                // 易经
                document.getElementById('hexagram-symbol').textContent = data.hexagram.symbol;
                document.getElementById('hexagram-name').textContent = data.hexagram.name;
                document.getElementById('hexagram-text').textContent = data.hexagram.text;
                document.getElementById('hexagram-fate').textContent = data.hexagram.fate;

                // 人生推断
                document.getElementById('life-prediction').textContent = data.lifePrediction;

                resultSection.classList.add('show');
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (err) {
                showError('测算失败：' + err.message + '，请确保综合算命服务器已启动（python fortune/fortune_server.py）');
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
    </script>
</body>
</html>
