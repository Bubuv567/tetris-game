<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生辰八字命理分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(135deg, #e94560, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            color: #ccc;
            font-size: 0.9rem;
        }

        input {
            padding: 12px 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #e94560;
            background: rgba(0, 0, 0, 0.3);
        }

        .hint {
            color: #888;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #e94560, #ff6b81);
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.3rem;
            text-align: center;
        }

        .bazi-box {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .bazi-title {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .bazi-value {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 5px;
        }

        .wuxing-box {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .wuxing-item {
            text-align: center;
            padding: 15px 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
        }

        .wuxing-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .wuxing-value {
            font-size: 0.9rem;
            color: #ccc;
        }

        .error {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            border-radius: 10px;
            color: #ff5252;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            color: #666;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 生辰八字命理分析</h1>
        <p class="subtitle">输入出生日期和时间，获取你的四柱八字与五行分析</p>

        <form id="bazi-form">
            <div class="form-group">
                <div class="input-group">
                    <label for="year">出生年份</label>
                    <input type="number" id="year" name="year" min="1900" max="2100" value="1990" required>
                </div>
                <div class="input-group">
                    <label for="month">出生月份</label>
                    <input type="number" id="month" name="month" min="1" max="12" value="5" required>
                </div>
                <div class="input-group">
                    <label for="day">出生日期</label>
                    <input type="number" id="day" name="day" min="1" max="31" value="15" required>
                </div>
                <div class="input-group">
                    <label for="hour">出生时辰（0-23）</label>
                    <input type="number" id="hour" name="hour" min="0" max="23" value="12" required>
                    <span class="hint">例如：中午12点填 12</span>
                </div>
            </div>

            <button type="submit" class="btn">
                <span class="loading" id="loading"></span>
                开始测算
            </button>
        </form>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <h2>📜 测算结果</h2>
            <div class="bazi-box">
                <div class="bazi-title">四柱八字</div>
                <div class="bazi-value" id="bazi-value">-</div>
            </div>
            <div class="bazi-title" style="text-align: center;">五行分布</div>
            <div class="wuxing-box">
                <div class="wuxing-item">
                    <div class="wuxing-name" style="color: #4CAF50;">木</div>
                    <div class="wuxing-value" id="wuxing-mu">-</div>
                </div>
                <div class="wuxing-item">
                    <div class="wuxing-name" style="color: #F44336;">火</div>
                    <div class="wuxing-value" id="wuxing-huo">-</div>
                </div>
                <div class="wuxing-item">
                    <div class="wuxing-name" style="color: #FF9800;">土</div>
                    <div class="wuxing-value" id="wuxing-tu">-</div>
                </div>
                <div class="wuxing-item">
                    <div class="wuxing-name" style="color: #FFD700;">金</div>
                    <div class="wuxing-value" id="wuxing-jin">-</div>
                </div>
                <div class="wuxing-item">
                    <div class="wuxing-name" style="color: #2196F3;">水</div>
                    <div class="wuxing-value" id="wuxing-shui">-</div>
                </div>
            </div>
        </div>

        <div class="footer">
            本页面仅供娱乐参考，结果基于开源项目 CrystalMarch/bazi
        </div>
    </div>

    <script>
        document.getElementById('bazi-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const day = document.getElementById('day').value;
            const hour = document.getElementById('hour').value;

            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const loading = document.getElementById('loading');
            const btn = document.querySelector('.btn');

            resultDiv.classList.remove('show');
            errorDiv.classList.remove('show');
            loading.style.display = 'inline-block';
            btn.disabled = true;

            try {
                const response = await fetch('/api/metaphysic', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        year: parseInt(year),
                        month: parseInt(month),
                        day: parseInt(day),
                        hour: parseInt(hour)
                    })
                });

                if (!response.ok) {
                    throw new Error('服务器响应错误：' + response.status);
                }

                const data = await response.json();

                document.getElementById('bazi-value').textContent = data.shenchenbazi;
                document.getElementById('wuxing-mu').textContent = (data.wuxing[0] * 100).toFixed(0) + '%';
                document.getElementById('wuxing-huo').textContent = (data.wuxing[1] * 100).toFixed(0) + '%';
                document.getElementById('wuxing-tu').textContent = (data.wuxing[2] * 100).toFixed(0) + '%';
                document.getElementById('wuxing-jin').textContent = (data.wuxing[3] * 100).toFixed(0) + '%';
                document.getElementById('wuxing-shui').textContent = (data.wuxing[4] * 100).toFixed(0) + '%';

                resultDiv.classList.add('show');
            } catch (err) {
                errorDiv.textContent = '测算失败：' + err.message + '，请确保服务器已启动（python server.py）';
                errorDiv.classList.add('show');
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
